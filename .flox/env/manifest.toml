schema-version = "1.11.0"


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
gnumake.pkg-path = "gnumake"
go.pkg-path = "go"
platformio.pkg-path = "platformio"
espflash.pkg-path = "espflash"
# gum.pkg-path = "gum"
# gum.version = "^0.14.5"


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
PIP_REQUIRE_VIRTUALENV = "false"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
# on-activate = '''
#   # -> Set variables, create files and directories
#   # -> Perform initialization steps, e.g. create a python venv
#   # -> Useful environment variables:
#   #      - FLOX_ENV_PROJECT=/home/user/example
#   #      - FLOX_ENV=/home/user/example/.flox/run
#   #      - FLOX_ENV_CACHE=/home/user/example/.flox/cache
# '''


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
common = '''
  # Only show the MOTD in interactive shells (not 'flox activate -- <cmd>').
  case "$-" in
    *i*)
      echo ""
      echo "therm-pro dev environment"
      echo "  • The 'therm-pro-server' service runs bin/therm-pro-server if it's built."
      echo "  • If it isn't running as expected, check the service logs:"
      echo "      flox services logs therm-pro-server"
      echo "  • Build first with: make build"
      echo ""
      ;;
  esac
'''
## Shell-specific customizations such as setting aliases go here:
# bash = ...
# zsh  = ...
# fish = ...


## Services ---------------------------------------------------------
##  $ flox services start             <- Starts all services
##  $ flox services status            <- Status of running services
##  $ flox activate --start-services  <- Activates & starts all
## ------------------------------------------------------------------
[services]
# Start the Go server if it has been built (bin/therm-pro-server exists).
therm-pro-server.command = '''
  bin="$FLOX_ENV_PROJECT/bin/therm-pro-server"
  if [ ! -x "$bin" ]; then
    echo "therm-pro-server: binary not found at $bin; run 'make build' first" >&2
    exit 1
  fi
  echo "therm-pro-server: starting $bin" >&2
  exec "$bin"
'''


## Include ----------------------------------------------------------
## ... environments to create a composed environment
## ------------------------------------------------------------------
[include]
# environments = [
#     { dir = "../common" }
# ]


## Build and publish your own packages ------------------------------
##  $ flox build
##  $ flox publish
## ------------------------------------------------------------------
[build]
