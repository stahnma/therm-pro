<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Therm-Pro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍖</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍖</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <h1>Therm-Pro</h1>
    <div class="header-actions">
      <span id="battery-badge" class="battery-badge" title="TP25 Battery">---%</span>
      <a href="/diagnostics" class="btn btn-docs" title="System Diagnostics">Diagnostics</a>
      <a href="/api/docs" class="btn btn-docs" title="API Documentation">API</a>
      <button id="toggle-theme" class="btn btn-theme" title="Toggle Light / Dark mode">Dark</button>
      <button id="toggle-unit" class="btn btn-unit" title="Toggle Fahrenheit / Celsius">&#176;F</button>
      <button id="reset-cook" class="btn btn-reset">Reset Cook</button>
    </div>
  </header>

  <div id="reconnect-banner" class="banner hidden">Reconnecting&hellip;</div>

  <main>
    <div id="probe-grid" class="probe-grid"></div>
    <div id="chart-container"></div>
  </main>

  <footer>
    <a href="https://github.com/stahnma/therm-pro" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      stahnma/therm-pro
    </a>
    <span id="commit-info"></span>
  </footer>

  <!-- Edit Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">Edit Probe</h2>
      <form id="modal-form" autocomplete="off">
        <input type="hidden" id="modal-probe-id">
        <label for="modal-label">Label</label>
        <input type="text" id="modal-label" maxlength="30">

        <label for="modal-target">Target Temp</label>
        <input type="number" id="modal-target" placeholder="optional" step="any">

        <label for="modal-high">High Temp Alert</label>
        <input type="number" id="modal-high" placeholder="optional" step="any">

        <label for="modal-low">Low Temp Alert</label>
        <input type="number" id="modal-low" placeholder="optional" step="any">

        <div class="modal-buttons">
          <button type="button" id="modal-cancel" class="btn btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
